name: Deploy - Main (Production)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Expo Lint
        run: npx expo lint

      - name: Build Expo (Production)
        run: npx expo export --platform android,ios
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: TypeScript check (Server)
        working-directory: server
        run: npx tsc --noEmit